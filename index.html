    <!-- SPA: same HTML for all routes — set canonical + og:url from the real URL before React (fixes GSC "alternate canonical" / wrong consolidation). Must match src/lib/seo.ts BASE_URL. -->
    <script>
      (function () {
        var BASE = "https://cannoncapitalpartners.org";
        var path = window.location.pathname || "/";
        if (path.length > 1 && path.endsWith("/")) path = path.slice(0, -1);
        var href = BASE + (path === "/" ? "/" : path);
        var link = document.createElement("link");
        link.rel = "canonical";
        link.href = href;
        document.head.appendChild(link);
        var og = document.querySelector('meta[property="og:url"]');
        if (!og) {
          og = document.createElement("meta");
          og.setAttribute("property", "og:url");
          document.head.appendChild(og);
        }
        og.setAttribute("content", href);
      })();
    </script>
